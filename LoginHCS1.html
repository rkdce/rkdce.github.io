<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login & Register</title>
<link rel="icon" href="https://drive.google.com/thumbnail?id=1AfmX3kHR6q3UkbAqyKY8HSDiyBVn1VzW&sz=64x64" type="image/png">
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            margin: 0;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        .form-container {
            width: 90%;
            max-width: 400px;
            background: #fff;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }

        .tabs {
            text-align: center;
            margin-bottom: 20px;
        }

        .tab {
            cursor: pointer;
            padding: 10px 20px;
            display: inline-block;
            background-color: #ddd;
            border-radius: 5px;
            margin: 0 10px;
            transition: background-color 0.3s;
        }

        .tab:hover, .active {
            background-color: #4CAF50;
            color: white;
        }

        .form {
            display: none;
        }

        .show {
            display: block;
        }

        input[type="text"],
        input[type="password"],
        input[type="email"] {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border: 1px solid #ccc;
            border-radius: 6px;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            background-color: #4CAF50;
            color: white;
            padding: 14px 0;
            margin: 10px 0;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
        }

        button:hover {
            background-color: #45a049;
        }

        p {
            text-align: center;
            color: red;
        }

        select {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border: 1px solid #ccc;
            border-radius: 6px;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
            font-size: 16px;
            background-color: white;
           // appearance: none; /* Removes default arrow in some browsers */
           // -webkit-appearance: none; /* Removes default arrow in Safari */
           // -moz-appearance: none; /* Removes default arrow in Firefox */
        }

        /* Add a custom arrow for the select box */
        .select-wrapper {
            position: relative;
            width: 100%;
        }

     /*   .select-wrapper::after {
            content: "▼";
            position: absolute;
            top: 50%;
            right: 12px;
            transform: translateY(-50%);
            pointer-events: none;
            color: #555;
            font-size: 12px;
        } +/

        /* Loader styles */
        .loader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .spinner {
            border: 4px solid rgba(0, 0, 0, 0.1);
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border-left-color: #4CAF50;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }
            100% {
                transform: rotate(360deg);
            }
        }
    </style>
</head>
<body>
<div class="form-container">

       <!-- In your form div -->

        <input type="text" id="regName" placeholder="Teacher Name" style="text-transform: uppercase;" required>

</div>

</div>

<div id="loader" class="loader" style="display: none;">
    <div class="spinner"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>

<script>
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxw4w08JvQ5c4Cg6jwiH-QL0GgAxaYbE0-uu36xa8rYrWBtVZih4K8-NaTWfpbsgnd8/exec';

    function showForm(formType) {
        document.querySelectorAll('.form').forEach(f => f.classList.remove('show'));
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.getElementById(`${formType}Form`).classList.add('show');
        document.querySelector(`[onclick="showForm('${formType}')"]`).classList.add('active');
    }

    function hashPassword(password) {
        return CryptoJS.SHA256(password).toString();
    }

    async function handleLogin() {
        const username = document.getElementById('loginUsername').value;
        const password = hashPassword(document.getElementById('loginPassword').value);

        try {
            document.getElementById('loader').style.display = 'flex'; // Show loader
            const response = await fetch(SCRIPT_URL, {
                method: 'POST',
                body: JSON.stringify({
                    action: 'login',
                    username: username,
                    password: password
                })
            });
            const data = await response.json();

            document.getElementById('loginMessage').textContent = data.message;
            if (data.status === 'success') {
                console.log('User data:', data.user); // Debugging: Log the user object
                localStorage.setItem('user', JSON.stringify(data.user));
                window.location.href = 'dashboardHCS1.html';
            }
        } catch (error) {
            console.error('Error:', error);
        } finally {
            document.getElementById('loader').style.display = 'none'; // Hide loader
        }
    }


    // In your script section
async function handleRegister(event) {
    event.preventDefault(); // Prevent default form submission
    
    const username = document.getElementById('regUsername').value;
    const email = document.getElementById('regEmail').value;
    const password = hashPassword(document.getElementById('regPassword').value);
    const userType = document.getElementById('regUserType').value;
    const tClass = document.getElementById('regTeacherClass').value;
    const tName = document.getElementById('regName').value;
    const tPhone = document.getElementById('regPhone').value;

    try {
        document.getElementById('loader').style.display = 'flex'; // Show loader
        const response = await fetch(SCRIPT_URL, {
            method: 'POST',
            body: JSON.stringify({
                action: 'register',
                userType: userType,
                username: username,
                tClass: tClass,
                tName : tName,
                tPhone: tPhone,
                email: email,
                password: password,
            })
        });
        const data = await response.json();

        const regMessage = document.getElementById('regMessage');
        regMessage.textContent = data.message;
        
        // Add success/error styling
        if (data.status === 'success') {
            regMessage.style.color = 'green';
            // Clear form on successful registration
            document.getElementById('registrationForm').reset();
        } else {
            regMessage.style.color = 'red';
        }
    } catch (error) {
        console.error('Error:', error);
        document.getElementById('regMessage').textContent = 'An error occurred during registration.';
        document.getElementById('regMessage').style.color = 'red';
    } finally {
        document.getElementById('loader').style.display = 'none'; // Hide loader
    }
}

// Add event listener to the form
document.getElementById('registrationForm').addEventListener('submit', handleRegister);
</script>

<script>
function loadClassList(selectedClass = "") {
    fetch(GAS_URL, {
        method: 'POST',
        body: JSON.stringify({
            action: 'getClassList'
        })
    })
   .then(res => res.json())
    .then(classes => {
        const select = document.getElementById("regTeacherClass");

        select.innerHTML = '<option value="">-- Select Class --</option>';

        const uniqueClasses = [...new Set(classes)];

        uniqueClasses.forEach(cls => {
            let option = document.createElement("option");
            option.value = cls;
            option.textContent = cls;
            select.appendChild(option);
        });
    });
}

document.addEventListener("DOMContentLoaded", () => {
    try {
        loadClassList();
    } catch (e) {
        console.error("Error in loading:", e);
    }
});    
    
</script>
