<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:linear-gradient(to right,#141e30,#243b55);
    min-height:100vh;
    color:white;
    padding:20px;
}

/* MAIN CONTAINER */

.container{
    max-width:900px;
    margin:auto;
}

/* HEADER */

.header{
    text-align:center;
    margin-bottom:30px;
}

.logo{
    width:120px;
    height:120px;
    border-radius:50%;
    object-fit:cover;
    border:4px solid white;
    margin-bottom:15px;
    box-shadow:0 0 15px rgba(255,255,255,0.4);
}

h1{
    font-size:40px;
    margin-bottom:10px;
}

.subtitle{
    font-size:18px;
    opacity:0.9;
}

/* ACCORDION */

.accordion{
    margin-bottom:18px;
    border-radius:15px;
    overflow:hidden;
    box-shadow:0 0 10px rgba(0,0,0,0.3);
}

/* ACCORDION HEADER */

.accordion-header{
    background:#00bcd4;
    padding:20px;
    font-size:24px;
    font-weight:bold;
    cursor:pointer;
    display:flex;
    justify-content:space-between;
    align-items:center;
    transition:0.3s;
}

.accordion-header:hover{
    background:#0097a7;
}

/* ACCORDION CONTENT */

.accordion-content{
    background:white;
    display:none;
    padding:20px;
}

/* UNIT BUTTONS */

.unit-btn{
    width:100%;
    margin:10px 0;
    padding:15px;
    border:none;
    border-radius:12px;
    background:#4caf50;
    color:white;
    font-size:18px;
    cursor:pointer;
    transition:0.3s;
    font-weight:bold;
}

.unit-btn:hover{
    background:#2e7d32;
    transform:scale(1.02);
}

/* FOOTER */

.footer{
    text-align:center;
    margin-top:40px;
    padding:20px;
    font-size:18px;
    opacity:0.9;
}

/* RESPONSIVE */

@media(max-width:600px){

    h1{
        font-size:30px;
    }

    .accordion-header{
        font-size:20px;
        padding:16px;
    }

    .unit-btn{
        font-size:16px;
        padding:13px;
    }

}

</style>
</head>

<script>

function openNotes(paper,unit){

    window.location.href =
    "notes.html?paper=" + paper + "&unit=" + unit;

}

function toggleAccordion(element){

    const allContents =
    document.querySelectorAll(".accordion-content");

    const allIcons =
    document.querySelectorAll(".accordion-header span:last-child");

    const currentContent =
    element.nextElementSibling;

    const currentIcon =
    element.querySelector("span:last-child");

    
    // CLOSE ALL ACCORDIONS

    allContents.forEach(content => {

        if(content !== currentContent){

            content.style.display = "none";

        }

    });

    allIcons.forEach(icon => {

        if(icon !== currentIcon){

            icon.innerHTML = "+";

        }

    });


    // TOGGLE CURRENT ACCORDION

    if(currentContent.style.display === "block"){

        currentContent.style.display = "none";

        currentIcon.innerHTML = "+";

    }else{

        currentContent.style.display = "block";

        currentIcon.innerHTML = "-";

    }

}

</script>
