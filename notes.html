<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Notes</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial;
}

body{
    background:#f5f5f5;
}

.header{
    background:#0d47a1;
    color:white;
    padding:25px;
    text-align:center;
}

.content{
    padding:25px;
}

.notes-box{
    background:white;
    padding:25px;
    border-radius:15px;
    box-shadow:0 0 10px rgba(0,0,0,0.2);
}

h2{
    margin-bottom:20px;
    color:#0d47a1;
}

p{
    margin-bottom:15px;
    line-height:1.7;
}

ul{
    margin-left:25px;
    margin-top:15px;
}

li{
    margin-bottom:10px;
    line-height:1.6;
}

.back-btn{
    margin-top:25px;
    padding:12px 25px;
    border:none;
    border-radius:10px;
    background:red;
    color:white;
    font-size:18px;
    cursor:pointer;
}

.back-btn:hover{
    background:darkred;
}

</style>
</head>

<body>

<div class="header">

    <h1 id="pageTitle">Notes</h1>

</div>

<div class="content">

    <div class="notes-box" id="notes">

    </div>

    <button class="back-btn" onclick="goBack()">
        Back
    </button>

</div>

<script>

const params = new URLSearchParams(window.location.search);

const paper = params.get("paper");

const unit = params.get("unit");

document.getElementById("pageTitle").innerHTML =
"Paper " + paper + " - Unit " + unit;


// NOTES CONTENT

if(paper=="201" && unit=="1"){

document.getElementById("notes").innerHTML = `

<h2>Paper 201 - Unit 1</h2>

<p>
Educational Psychology is the scientific study of human behaviour in educational situations.
</p>

<ul>

<li><b>Meaning of Psychology</b> - Study of behaviour and mental processes.</li>

<li><b>Educational Psychology</b> - Application of psychology in education.</li>

<li><b>Nature</b> - Scientific and practical subject.</li>

<li><b>Scope</b> - Includes teaching, learning and classroom behaviour.</li>

<li><b>Importance</b> - Helps teachers understand students.</li>

<li><b>Role of Teacher</b> - Guide and motivator.</li>

<li><b>Learning Process</b> - Understanding how students learn.</li>

<li><b>Individual Differences</b> - Every child is unique.</li>

<li><b>Motivation</b> - Encourages effective learning.</li>

<li><b>Intelligence</b> - Ability to solve problems.</li>

<li><b>Personality</b> - Behaviour pattern of individuals.</li>

<li><b>Development</b> - Physical and mental growth.</li>

<li><b>Memory</b> - Storing and recalling information.</li>

<li><b>Attention</b> - Concentration on learning.</li>

<li><b>Conclusion</b> - Educational psychology improves teaching-learning process.</li>

</ul>

`;

}


// DEFAULT NOTES

else{

document.getElementById("notes").innerHTML = `

<h2>Notes Coming Soon</h2>

<p>
You can add your own notes here for Paper ${paper} Unit ${unit}.
</p>

<ul>

<li>Introduction</li>
<li>Definition</li>
<li>Main Features</li>
<li>Characteristics</li>
<li>Importance</li>
<li>Advantages</li>
<li>Disadvantages</li>
<li>Educational Significance</li>
<li>Role of Teacher</li>
<li>Conclusion</li>

</ul>

`;

}

function goBack(){

window.location.href = "https://rkdce.github.io/2sem.html";

}

</script>

</body>
</html>
