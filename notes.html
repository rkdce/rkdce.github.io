<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Notes</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial;
}

body{
    background:#f5f5f5;
}

.header{
    background:#0d47a1;
    color:white;
    padding:25px;
    text-align:center;
}

.content{
    padding:25px;
}

.notes-box{
    background:white;
    padding:25px;
    border-radius:15px;
    box-shadow:0 0 10px rgba(0,0,0,0.2);
}

h2{
    margin-bottom:20px;
    color:#0d47a1;
}

p{
    margin-bottom:15px;
    line-height:1.7;
}

ul{
    margin-left:25px;
    margin-top:15px;
}

li{
    margin-bottom:10px;
    line-height:1.6;
}

.back-btn{
    margin-top:25px;
    padding:12px 25px;
    border:none;
    border-radius:10px;
    background:red;
    color:white;
    font-size:18px;
    cursor:pointer;
}

.back-btn:hover{
    background:darkred;
}

</style>
</head>

<body>

<div class="header">

    <h1 id="pageTitle">Notes</h1>

</div>

<div class="content">

    <div class="notes-box" id="notes">

    </div>

    <button class="back-btn" onclick="goBack()">
        Back
    </button>

</div>

<script>

const params = new URLSearchParams(window.location.search);

const paper = params.get("paper");

const unit = params.get("unit");

document.getElementById("pageTitle").innerHTML =
"Paper " + paper + " - Unit " + unit;


// NOTES CONTENT

if(paper=="204" && unit=="1"){

<p><b>1. Development of Social Awareness</b><br>
Students understand society and responsibilities.</p>

<p><b>2. Development of Democratic Values</b><br>
Equality and justice are promoted.</p>

<p><b>3. Promotion of Social Adjustment</b><br>
Students learn adjustment in society.</p>

<p><b>4. Development of Responsible Citizenship</b><br>
Citizenship qualities are developed.</p>

<p><b>5. Promotion of National Integration</b><br>
Unity and brotherhood are encouraged.</p>

<p><b>6. Understanding of Social Institutions</b><br>
Students learn functions of institutions.</p>

<p><b>7. Development of Moral Values</b><br>
Honesty and discipline are developed.</p>

<p><b>8. Promotion of Social Equality</b><br>
Discrimination is removed.</p>

<p><b>9. Development of Leadership Qualities</b><br>
Leadership ability is encouraged.</p>

<p><b>10. Encouragement of Cooperation</b><br>
Teamwork and cooperation are promoted.</p>

<p><b>11. Understanding of Culture and Traditions</b><br>
Students learn cultural heritage.</p>

<p><b>12. Development of Problem-solving Ability</b><br>
Students solve social problems scientifically.</p>

<p><b>13. Promotion of Discipline</b><br>
Self-control and obedience are developed.</p>

<p><b>14. Preparation for Social Life</b><br>
Students become socially prepared.</p>

<p><b>15. Development of Humanitarian Attitude</b><br>
Love and sympathy are developed.</p>

`;

}



    

else{

document.getElementById("notes").innerHTML = `

<h2>Notes Coming Soon</h2>

<p>
You can add your own notes here for Paper ${paper} Unit ${unit}.
</p>

<ul>

<li>Introduction</li>
<li>Definition</li>
<li>Main Features</li>
<li>Characteristics</li>
<li>Importance</li>
<li>Advantages</li>
<li>Disadvantages</li>
<li>Educational Significance</li>
<li>Role of Teacher</li>
<li>Conclusion</li>

</ul>

`;

}

function goBack(){

window.location.href = "https://rkdce.github.io/2sem.html";

}

</script>

</body>
</html>
