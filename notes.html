<h2>1. Sociology as a Science</h2>

<p>

<h1 align="center">PAPER-204 : EDUCATIONAL PSYCHOLOGY</h1>

<h1>5.1 GENERAL MAXIMS OF TEACHING</h1>

<h2>Introduction</h2>

<p>
Maxims of teaching are general rules and principles which help teachers make teaching effective, simple and meaningful. These maxims guide teachers in organizing classroom teaching-learning process.
</p>

<hr>

<h2>Meaning of Maxims of Teaching</h2>

<p>
Maxims of teaching are guiding principles used by teachers for effective teaching-learning process.
</p>

<hr>

<h2>15 Important Maxims of Teaching</h2>

<ol>

<li><b>Known-to-Unknown :</b> Teaching should begin from familiar concepts to unfamiliar concepts.</li>

<li><b>Simple-to-Complex :</b> Learning should proceed from easy topics to difficult topics.</li>

<li><b>Concrete-to-Abstract :</b> Teaching should begin with concrete objects before abstract ideas.</li>

<li><b>Particular-to-General :</b> Specific examples should lead to general principles.</li>

<li><b>Whole-to-Part :</b> Whole concept should be explained before parts.</li>

<li><b>Indefinite-to-Definite :</b> Vague ideas should become clear and definite.</li>

<li><b>Psychological-to-Logical :</b> Teaching should follow learner interest before subject order.</li>

<li><b>Analysis-to-Synthesis :</b> Break concepts into parts and then combine them.</li>

<li><b>Empirical-to-Rational :</b> Experience should lead to reasoning.</li>

<li><b>Actual-to-Representative :</b> Real objects should be used before pictures or models.</li>

<li><b>Near-to-Far :</b> Begin from nearby environment and then distant environment.</li>

<li><b>Easy-to-Difficult :</b> Easy tasks should be taught before difficult tasks.</li>

<li><b>Learning-by-Doing :</b> Students learn better through activities.</li>

<li><b>Revision-and-Practice :</b> Repetition strengthens learning.</li>

<li><b>Activity-Based :</b> Active participation improves understanding.</li>

</ol>

<h2>Conclusion</h2>

<p>
Maxims of teaching make classroom teaching systematic, simple and learner-centered.
</p>
